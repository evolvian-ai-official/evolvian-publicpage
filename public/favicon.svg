<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .favicon-bg { fill: #1b2a41; }
      .favicon-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 45px; font-weight: bold; fill: white; text-anchor: middle; dominant-baseline: central; }
    </style>
  </defs>
  <!-- Circular background -->
  <circle cx="50" cy="50" r="50" class="favicon-bg"/>
  <!-- E letter for Evolvian -->
  <text x="50" y="50" class="favicon-text">E</text>
</svg>